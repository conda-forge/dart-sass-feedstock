context:
  version: "1.98.0"

package:
  name: dart-sass
  version: ${{ version }}

source:
  url: https://github.com/sass/dart-sass/archive/refs/tags/${{ version }}.tar.gz
  sha256: 2eab6aebaba4e095e67b970baf8b0bdb4b934be17fdee1ca5d5da6a490b5517a

build:
  number: 0
  dynamic_linking:
    binary_relocation: false
  skip:
    # we don't have dart-sdk on ppc64le, so we can't build this.
    - ppc64le

requirements:
  host:
    - dart-sdk
    - buf

tests:
  - script:
      - sass --version
      - sass test.sass
    files:
      recipe:
        - test.sass

about:
  homepage: https://sass-lang.com/dart-sass
  license: MIT
  license_file:
    - LICENSE
  summary: Dart implementation of Sass. Sass makes CSS fun again.
  documentation: https://sass-lang.com/dart-sass
  repository: https://github.com/sass/dart-sass

extra:
  recipe-maintainers:
    - msarahan
    - munechika-koyo
